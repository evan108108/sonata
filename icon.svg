<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Deep dark background gradient like the cairn image -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </linearGradient>

    <!-- Warm amber glow from behind the cairn -->
    <radialGradient id="backGlow" cx="50%" cy="65%" r="30%">
      <stop offset="0%" style="stop-color:#E8820C;stop-opacity:0.6"/>
      <stop offset="40%" style="stop-color:#C4580A;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#C4580A;stop-opacity:0"/>
    </radialGradient>

    <!-- Cool blue-teal horizon glow -->
    <radialGradient id="horizonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#2a4a6b;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0"/>
    </radialGradient>

    <!-- Stone gradient - dark with warm edge light -->
    <linearGradient id="stone1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3545"/>
      <stop offset="40%" style="stop-color:#2a2535"/>
      <stop offset="100%" style="stop-color:#4a4050"/>
    </linearGradient>
    <linearGradient id="stone2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3d3848"/>
      <stop offset="50%" style="stop-color:#2d2838"/>
      <stop offset="100%" style="stop-color:#45404f"/>
    </linearGradient>

    <!-- Amber light hitting stone edges -->
    <linearGradient id="stoneEdge" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4700A;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#D4700A;stop-opacity:0"/>
    </linearGradient>

    <!-- Musical note glow -->
    <radialGradient id="noteGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E8A040;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#E8820C;stop-opacity:0.3"/>
    </radialGradient>

    <!-- Ground glow -->
    <radialGradient id="groundGlow" cx="50%" cy="0%" r="80%" fx="50%" fy="0%">
      <stop offset="0%" style="stop-color:#D4700A;stop-opacity:0.35"/>
      <stop offset="60%" style="stop-color:#8B4513;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Horizon glow (blue-teal) -->
  <ellipse cx="512" cy="520" rx="400" ry="250" fill="url(#horizonGlow)"/>

  <!-- Back-light glow (warm amber behind cairn) -->
  <ellipse cx="512" cy="580" rx="250" ry="200" fill="url(#backGlow)"/>

  <!-- Ground plane glow -->
  <ellipse cx="512" cy="700" rx="350" ry="80" fill="url(#groundGlow)"/>

  <!-- === CAIRN: stacked stones with musical staff gaps === -->

  <!-- Base stone (widest) -->
  <g opacity="0.95">
    <rect x="370" y="620" width="284" height="52" rx="12" fill="url(#stone1)"/>
    <rect x="370" y="660" width="284" height="12" rx="6" fill="url(#stoneEdge)" opacity="0.5"/>
    <!-- Amber edge light on right -->
    <rect x="630" y="620" width="24" height="52" rx="8" fill="#D4700A" opacity="0.2"/>
  </g>

  <!-- Second stone -->
  <g opacity="0.95">
    <rect x="392" y="555" width="240" height="48" rx="11" fill="url(#stone2)"/>
    <rect x="392" y="591" width="240" height="12" rx="6" fill="url(#stoneEdge)" opacity="0.45"/>
    <rect x="610" y="555" width="22" height="48" rx="8" fill="#D4700A" opacity="0.2"/>
  </g>

  <!-- Third stone (slightly offset) -->
  <g opacity="0.92">
    <rect x="405" y="495" width="215" height="44" rx="10" fill="url(#stone1)"/>
    <rect x="405" y="527" width="215" height="12" rx="6" fill="url(#stoneEdge)" opacity="0.4"/>
    <rect x="598" y="495" width="22" height="44" rx="8" fill="#D4700A" opacity="0.2"/>
  </g>

  <!-- Fourth stone -->
  <g opacity="0.9">
    <rect x="418" y="440" width="188" height="40" rx="9" fill="url(#stone2)"/>
    <rect x="418" y="468" width="188" height="12" rx="6" fill="url(#stoneEdge)" opacity="0.35"/>
    <rect x="586" y="440" width="20" height="40" rx="8" fill="#D4700A" opacity="0.18"/>
  </g>

  <!-- Fifth stone (smaller) -->
  <g opacity="0.88">
    <rect x="434" y="390" width="156" height="36" rx="8" fill="url(#stone1)"/>
    <rect x="434" y="414" width="156" height="12" rx="6" fill="url(#stoneEdge)" opacity="0.3"/>
    <rect x="572" y="390" width="18" height="36" rx="7" fill="#D4700A" opacity="0.15"/>
  </g>

  <!-- Top stone (smallest) -->
  <g opacity="0.85">
    <rect x="455" y="348" width="114" height="30" rx="7" fill="url(#stone2)"/>
    <rect x="455" y="366" width="114" height="12" rx="6" fill="url(#stoneEdge)" opacity="0.25"/>
  </g>

  <!-- === Musical elements emerging from the gaps === -->

  <!-- Light beams through gaps (like the cairn photo) -->
  <g opacity="0.4">
    <rect x="480" y="603" width="3" height="17" rx="1.5" fill="#E8A040"/>
    <rect x="520" y="603" width="3" height="17" rx="1.5" fill="#E8A040"/>
    <rect x="460" y="539" width="2.5" height="16" rx="1.25" fill="#E8A040"/>
    <rect x="540" y="539" width="2.5" height="16" rx="1.25" fill="#E8A040"/>
    <rect x="475" y="480" width="2" height="15" rx="1" fill="#E8A040"/>
    <rect x="530" y="480" width="2" height="15" rx="1" fill="#E8A040"/>
    <rect x="485" y="426" width="2" height="14" rx="1" fill="#E8A040"/>
    <rect x="525" y="426" width="2" height="14" rx="1" fill="#E8A040"/>
  </g>

  <!-- Musical notes floating up from cairn, like sparks/memories -->
  <!-- Note 1 (quarter note) - rising left -->
  <g transform="translate(380, 310)" opacity="0.7">
    <ellipse cx="0" cy="0" rx="11" ry="8.5" transform="rotate(-15)" fill="#E8A040"/>
    <rect x="9" y="-38" width="3" height="38" rx="1.5" fill="#E8A040"/>
  </g>

  <!-- Note 2 (eighth note) - rising right -->
  <g transform="translate(620, 280)" opacity="0.55">
    <ellipse cx="0" cy="0" rx="9" ry="7" transform="rotate(-15)" fill="#D4700A"/>
    <rect x="7" y="-32" width="2.5" height="32" rx="1.25" fill="#D4700A"/>
    <path d="M9,-32 Q22,-24 16,-16" stroke="#D4700A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Note 3 (small, fading) - highest -->
  <g transform="translate(450, 260)" opacity="0.35">
    <ellipse cx="0" cy="0" rx="7" ry="5.5" transform="rotate(-15)" fill="#E8A040"/>
    <rect x="5.5" y="-26" width="2" height="26" rx="1" fill="#E8A040"/>
  </g>

  <!-- Note 4 (tiny, almost gone) -->
  <g transform="translate(560, 240)" opacity="0.2">
    <ellipse cx="0" cy="0" rx="5.5" ry="4" transform="rotate(-15)" fill="#E8A040"/>
    <rect x="4" y="-20" width="1.5" height="20" rx="0.75" fill="#E8A040"/>
  </g>

  <!-- Subtle staff lines (very faint, connecting the musical feel) -->
  <g opacity="0.08" stroke="#E8A040" stroke-width="1.5">
    <line x1="330" y1="330" x2="694" y2="330"/>
    <line x1="345" y1="315" x2="679" y2="315"/>
    <line x1="360" y1="300" x2="664" y2="300"/>
    <line x1="375" y1="285" x2="649" y2="285"/>
    <line x1="390" y1="270" x2="634" y2="270"/>
  </g>

  <!-- Particle dots (memory fragments / musical dust) -->
  <g fill="#E8A040">
    <circle cx="400" cy="340" r="2" opacity="0.3"/>
    <circle cx="590" cy="320" r="1.5" opacity="0.25"/>
    <circle cx="470" cy="290" r="1.8" opacity="0.2"/>
    <circle cx="550" cy="260" r="1.3" opacity="0.15"/>
    <circle cx="430" cy="250" r="1" opacity="0.12"/>
    <circle cx="510" cy="230" r="1.5" opacity="0.1"/>
    <circle cx="480" cy="210" r="1" opacity="0.08"/>
  </g>

  <!-- Bottom text: SONATA -->
  <text x="512" y="790" font-family="SF Pro Display, Helvetica Neue, sans-serif" font-size="56" font-weight="200" fill="#E8A040" text-anchor="middle" letter-spacing="16" opacity="0.5">SONATA</text>
</svg>
