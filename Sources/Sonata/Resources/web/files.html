<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Files — Sonata</title>
<link rel="stylesheet" href="shared.css">
<style>
.dir-tree { padding: 6px 0; }
.dir-item {
  padding: 6px 14px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
}
.dir-item:hover { background: var(--bg-elev2); }
.dir-item.active { background: var(--bg-elev2); color: var(--accent); }
.dir-item .icon { font-size: 11px; width: 14px; text-align: center; color: var(--text-dim); }
.dir-item.active .icon { color: var(--accent); }
.dir-children { padding-left: 16px; }
.dir-children.collapsed { display: none; }

.file-table { width: 100%; border-collapse: collapse; }
.file-table th {
  text-align: left;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.file-table td {
  padding: 7px 12px;
  font-size: 12px;
  border-bottom: 1px solid var(--border);
}
.file-table tr { cursor: pointer; }
.file-table tr:hover td { background: var(--bg-elev); }
.file-table .name { color: var(--text); font-weight: 500; }
.file-table .name.dir-link { color: var(--yellow); }
.file-table .size, .file-table .modified { color: var(--text-dim); font-size: 11px; }
.file-table .icon-col { width: 28px; color: var(--text-dim); font-size: 11px; text-align: center; }

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: var(--text-dim);
}
.breadcrumb a { cursor: pointer; }
.breadcrumb .sep { color: var(--border); }

.file-viewer { max-width: 800px; }
.file-viewer .file-path {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 10px;
  font-family: var(--mono);
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <span style="font-weight:600;font-size:12px;">Directories</span>
    </div>
    <div class="sidebar-list" id="dir-tree">
      <div class="empty"><span class="spinner"></span>&nbsp; Loading...</div>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">
      <div class="breadcrumb" id="breadcrumb">
        <h1>Files</h1>
      </div>
      <div class="spacer"></div>
      <button id="refresh">Refresh</button>
    </div>
    <div class="content" id="detail">
      <div class="empty">Select a directory to browse</div>
    </div>
  </div>
</div>

<script src="marked.min.js"></script>
<script src="shared.js"></script>
<script>
let currentDir = null;
let currentFile = null;
let expandedDirs = new Set(['private', 'documents']);

async function loadDirs() {
  const tree = document.getElementById('dir-tree');
  try {
    const data = await apiGet('/api/files/dirs');
    const dirs = data.dirs || [];
    if (!dirs.length) {
      tree.innerHTML = '<div class="empty">No directories in ~/.sonata/</div>';
      return;
    }
    renderDirTree(dirs);
  } catch (e) {
    showError(tree, e);
  }
}

function renderDirTree(dirs) {
  const tree = document.getElementById('dir-tree');
  tree.innerHTML = dirs.map(d => `
    <div class="dir-item ${currentDir === d.path ? 'active' : ''}" data-path="${escapeHtml(d.path)}">
      <span class="icon">${expandedDirs.has(d.path) ? '\u25BE' : '\u25B8'}</span>
      ${escapeHtml(d.name)}
    </div>
    <div class="dir-children ${expandedDirs.has(d.path) ? '' : 'collapsed'}" id="children-${escapeHtml(d.path)}"></div>
  `).join('');

  tree.querySelectorAll('.dir-item').forEach(el => {
    el.addEventListener('click', () => navigateDir(el.dataset.path));
  });

  // Auto-load expanded dirs
  for (const dir of expandedDirs) {
    loadSubItems(dir);
  }
}

async function loadSubItems(dirPath) {
  const container = document.getElementById('children-' + dirPath);
  if (!container) return;
  try {
    const data = await apiGet('/api/files/list', { dir: dirPath });
    const subdirs = (data.files || []).filter(f => f.isDirectory);
    container.innerHTML = subdirs.map(d => `
      <div class="dir-item ${currentDir === d.path ? 'active' : ''}" data-path="${escapeHtml(d.path)}" style="padding-left:30px;">
        <span class="icon">\u25B8</span>
        ${escapeHtml(d.name)}
      </div>
    `).join('');
    container.querySelectorAll('.dir-item').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        navigateDir(el.dataset.path);
      });
    });
  } catch (e) { /* ignore */ }
}

async function navigateDir(dirPath) {
  currentDir = dirPath;
  currentFile = null;

  // Expand parent in tree
  const root = dirPath.split('/')[0];
  expandedDirs.add(root);

  updateBreadcrumb(dirPath);
  loadDirs();

  const detail = document.getElementById('detail');
  showLoading(detail, 'Loading files');

  try {
    const data = await apiGet('/api/files/list', { dir: dirPath });
    const files = data.files || [];
    if (!files.length) {
      detail.innerHTML = '<div class="empty">Empty directory</div>';
      return;
    }

    // Sort: directories first, then files by name
    files.sort((a, b) => {
      if (a.isDirectory !== b.isDirectory) return a.isDirectory ? -1 : 1;
      return a.name.localeCompare(b.name);
    });

    detail.innerHTML = `<table class="file-table">
      <thead><tr>
        <th class="icon-col"></th>
        <th>Name</th>
        <th style="width:80px;">Size</th>
        <th style="width:100px;">Modified</th>
      </tr></thead>
      <tbody>
        ${files.map(f => `<tr data-path="${escapeHtml(f.path)}" data-isdir="${f.isDirectory}">
          <td class="icon-col">${f.isDirectory ? '\uD83D\uDCC1' : fileIcon(f.name)}</td>
          <td class="name ${f.isDirectory ? 'dir-link' : ''}">${escapeHtml(f.name)}</td>
          <td class="size">${f.isDirectory ? '-' : fmtSize(f.size)}</td>
          <td class="modified">${f.modified ? fmtDate(f.modified) : '-'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;

    detail.querySelectorAll('tr[data-path]').forEach(row => {
      row.addEventListener('click', () => {
        if (row.dataset.isdir === 'true') {
          navigateDir(row.dataset.path);
        } else {
          readFile(row.dataset.path);
        }
      });
    });
  } catch (e) {
    showError(detail, e);
  }
}

async function readFile(filePath) {
  currentFile = filePath;
  const detail = document.getElementById('detail');
  showLoading(detail, 'Reading file');
  updateBreadcrumb(filePath, true);

  try {
    const data = await apiGet('/api/files/read', { path: filePath });
    const ext = filePath.split('.').pop().toLowerCase();
    const isMarkdown = ['md', 'markdown'].includes(ext);

    detail.innerHTML = `
      <div class="file-viewer">
        <div class="file-path">${escapeHtml(data.path)} &middot; ${fmtSize(data.size)} &middot; ${fmtDate(data.modified)}</div>
        ${isMarkdown
          ? `<div class="markdown">${renderMarkdown(data.content)}</div>`
          : `<pre><code>${escapeHtml(data.content)}</code></pre>`
        }
      </div>
    `;
  } catch (e) {
    showError(detail, e);
  }
}

function updateBreadcrumb(path, isFile) {
  const bc = document.getElementById('breadcrumb');
  const parts = path ? path.split('/') : [];
  let html = '<a onclick="resetView()" style="cursor:pointer;">Files</a>';

  for (let i = 0; i < parts.length; i++) {
    const partial = parts.slice(0, i + 1).join('/');
    const isLast = i === parts.length - 1;
    html += '<span class="sep">/</span>';
    if (isLast && isFile) {
      html += `<span>${escapeHtml(parts[i])}</span>`;
    } else {
      html += `<a onclick="navigateDir('${escapeHtml(partial)}')" style="cursor:pointer;">${escapeHtml(parts[i])}</a>`;
    }
  }
  bc.innerHTML = html;
}

function resetView() {
  currentDir = null;
  currentFile = null;
  updateBreadcrumb(null);
  document.getElementById('detail').innerHTML = '<div class="empty">Select a directory to browse</div>';
  loadDirs();
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['md', 'markdown'].includes(ext)) return '\uD83D\uDCC4';
  if (['json', 'yaml', 'yml', 'toml'].includes(ext)) return '\u2699\uFE0F';
  if (['sh', 'bash', 'zsh'].includes(ext)) return '\uD83D\uDCDC';
  if (['js', 'ts', 'swift', 'py'].includes(ext)) return '\uD83D\uDCBB';
  if (['txt', 'log'].includes(ext)) return '\uD83D\uDCC3';
  return '\uD83D\uDCC4';
}

function fmtSize(bytes) {
  if (bytes === 0) return '0 B';
  const units = ['B', 'KB', 'MB', 'GB'];
  const i = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), 3);
  const val = bytes / Math.pow(1024, i);
  return val.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
}

document.getElementById('refresh').addEventListener('click', () => {
  if (currentFile) readFile(currentFile);
  else if (currentDir) navigateDir(currentDir);
  else loadDirs();
});

loadDirs();
</script>
</body>
</html>
