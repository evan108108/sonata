<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tasks — Sonata</title>
<link rel="stylesheet" href="shared.css">
<style>
.resume-btn {
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 4px;
  border: 1px solid #a855f7;
  color: #a855f7;
  background: transparent;
  cursor: pointer;
}
.resume-btn:hover { background: rgba(168, 85, 247, 0.15); }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="search" id="q" placeholder="Filter tasks…" style="flex:1;">
    </div>
    <div class="sidebar-list" id="list">
      <div class="empty"><span class="spinner"></span>&nbsp; Loading…</div>
    </div>
  </div>
  <div class="main">
    <div class="toolbar">
      <h1 id="title">Tasks</h1>
      <div class="spacer"></div>
      <button id="refresh">Refresh</button>
    </div>
    <div class="content" id="detail">
      <div class="empty">Select a task to view details</div>
    </div>
  </div>
</div>

<script src="marked.min.js"></script>
<script src="shared.js"></script>
<script>
let tasks = [];
let stats = null;
let filter = '';
let selectedId = null;
const finishedLimits = { completed: 20, failed: 20, cancelled: 20 };

const STATUS_ORDER = ['active', 'in_progress', 'pending', 'completed', 'done', 'failed', 'cancelled'];
const STATUS_COLOR = {
  active: 'green', in_progress: 'green',
  pending: 'yellow',
  completed: 'blue', done: 'blue',
  failed: 'red', cancelled: 'purple',
};

async function loadTasks() {
  const list = document.getElementById('list');
  showLoading(list);
  try {
    // Fetch stats for real totals
    stats = await apiGet('/api/task/stats');
    // Fetch active + pending fully (always small)
    const [active, pending, completed, failed, cancelled] = await Promise.all([
      apiGet('/api/task/list', { limit: 500, status: 'active' }),
      apiGet('/api/task/list', { limit: 500, status: 'pending' }),
      apiGet('/api/task/list', { limit: finishedLimits.completed, status: 'completed' }),
      apiGet('/api/task/list', { limit: finishedLimits.failed, status: 'failed' }),
      apiGet('/api/task/list', { limit: finishedLimits.cancelled, status: 'cancelled' }),
    ]);
    const toArr = d => d.tasks || d.items || d || [];
    // Each finished status gets its own limit
    tasks = [...toArr(pending), ...toArr(active), ...toArr(completed).slice(0, finishedLimits.completed), ...toArr(failed).slice(0, finishedLimits.failed), ...toArr(cancelled).slice(0, finishedLimits.cancelled)];
    renderList();
  } catch (e) {
    showError(list, e);
  }
}

async function loadMore(status) {
  if (finishedLimits[status] !== undefined) {
    finishedLimits[status] += 20;
  }
  await loadTasks();
}

function renderList() {
  const list = document.getElementById('list');
  const f = filter.toLowerCase();
  const filtered = tasks.filter(t => !f
    || (t.title || '').toLowerCase().includes(f)
    || (t.status || '').toLowerCase().includes(f));

  if (!filtered.length) {
    list.innerHTML = '<div class="empty">No tasks</div>';
    return;
  }

  const groups = {};
  filtered.forEach(t => {
    const s = (t.status || 'unknown').toLowerCase();
    (groups[s] = groups[s] || []).push(t);
  });

  const ordered = STATUS_ORDER.filter(s => groups[s]).concat(
    Object.keys(groups).filter(s => !STATUS_ORDER.includes(s))
  );

  // Show real totals from stats in section headers
  const realCount = (status) => {
    if (!stats) return null;
    const s = status.toLowerCase();
    if (s === 'active' || s === 'in_progress') return stats.active;
    if (s === 'pending') return stats.pending;
    if (s === 'completed' || s === 'done') return stats.completed;
    if (s === 'failed') return stats.failed;
    if (s === 'cancelled') return stats.cancelled;
    return null;
  };

  list.innerHTML = ordered.map(status => {
    const items = groups[status];
    const color = STATUS_COLOR[status] || '';
    const total = realCount(status);
    const countLabel = total !== null && total !== items.length ? `${items.length} of ${total}` : `${items.length}`;
    const sectionHasMore = total !== null && total > items.length && finishedLimits[status] !== undefined;
    return `<div class="section-header">${escapeHtml(status)} (${countLabel})</div>` +
      items.map(t => {
        const id = t.id || t._id || '';
        return `<div class="sidebar-item ${id === selectedId ? 'active' : ''}" data-id="${escapeHtml(id)}">
          ${escapeHtml(t.title || '(untitled)')}
          <span class="meta">
            <span class="badge ${color}">${escapeHtml(status)}</span>
            ${escapeHtml(fmtDate(t.createdAt || t.created_at))}
          </span>
        </div>`;
      }).join('') +
      (sectionHasMore ? `<div class="sidebar-item" style="text-align:center;opacity:0.6;cursor:pointer;" onclick="loadMore('${status}')">Load more ${escapeHtml(status)}…</div>` : '');
  }).join('');

  list.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => selectItem(el.dataset.id));
  });
}

function selectItem(id) {
  selectedId = id;
  const t = tasks.find(x => (x.id || x._id) === id);
  renderList();
  const detail = document.getElementById('detail');
  if (!t) { detail.innerHTML = '<div class="empty">Not found</div>'; return; }

  const status = (t.status || 'unknown').toLowerCase();
  const color = STATUS_COLOR[status] || '';
  detail.innerHTML = `
    <h2 style="margin-bottom:10px;font-size:18px;">${escapeHtml(t.title || '(untitled)')}</h2>
    <div style="margin-bottom:14px;">
      <span class="badge ${color}">${escapeHtml(status)}</span>
      ${t.assignedTo ? `<span class="badge">→ ${escapeHtml(t.assignedTo)}</span>` : ''}
      ${t.parentId ? `<span class="badge purple">subtask</span>` : ''}
      <span style="color:var(--text-dim);font-size:11px;margin-left:8px;">
        created ${escapeHtml(fmtDate(t.createdAt || t.created_at))}
      </span>
    </div>
    ${t.prompt ? `<div class="section-header">Prompt</div><pre>${escapeHtml(t.prompt)}</pre>` : ''}
    ${t.result ? `<div class="section-header">Result</div><pre>${escapeHtml(typeof t.result === 'string' ? t.result : JSON.stringify(t.result, null, 2))}</pre>` : ''}
    ${t.error ? `<div class="section-header">Error</div><pre style="color:var(--red);">${escapeHtml(t.error)}</pre>` : ''}
    <div id="attempts-section"></div>
    <div class="section-header">Raw</div>
    <pre style="font-size:10px;color:var(--text-dim);">${escapeHtml(JSON.stringify(t, null, 2))}</pre>
  `;

  // Load worker event attempts for this task
  if (status === 'completed' || status === 'failed') {
    loadAttempts(id, t.title);
  }
}

async function loadAttempts(taskId, taskTitle) {
  const section = document.getElementById('attempts-section');
  if (!section) return;
  try {
    // Server-side filter by task_id so older completed tasks aren't pushed out
    // of a global LIMIT window by recent high-volume events (e.g. email churn).
    const events = await apiGet('/api/worker/events/recent', { limit: 50, task_id: taskId });
    const attempts = Array.isArray(events) ? events : (events.items || []);
    if (!attempts.length) return;

    const rows = attempts.map((a, i) => {
      const statusColor = a.status === 'completed' ? 'green' : a.status === 'failed' ? 'red' : 'blue';
      const duration = a.assignedAt && a.completedAt
        ? `${Math.round((a.completedAt - a.assignedAt) / 1000)}s`
        : '';
      const resumeBtn = a.sessionId && a.status !== 'assigned'
        ? `<button class="resume-btn" onclick="openInspector('${escapeHtml(a.sessionId)}', '${escapeHtml(taskTitle || '')}')">Resume</button>`
        : a.status === 'assigned'
        ? '<span style="color:var(--blue);font-size:11px;font-style:italic;">(in progress)</span>'
        : '';
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
        <span class="badge ${statusColor}">${escapeHtml(a.status)}</span>
        ${a.assignedTo ? `<span style="font-size:11px;color:var(--text-dim);font-family:monospace;">${escapeHtml(a.assignedTo)}</span>` : ''}
        ${duration ? `<span style="font-size:11px;color:var(--text-dim);">${duration}</span>` : ''}
        <span style="flex:1;"></span>
        ${resumeBtn}
      </div>`;
    }).join('');

    section.innerHTML = `<div class="section-header">Worker Attempts (${attempts.length})</div>${rows}`;
  } catch (e) {
    // silently fail — attempts are optional
  }
}

async function openInspector(sessionId, title) {
  try {
    await fetch('/api/worker/inspect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId, title }),
    });
  } catch (e) {
    console.error('Failed to open inspector:', e);
  }
}

document.getElementById('q').addEventListener('input', debounce(e => { filter = e.target.value.trim(); renderList(); }, 150));
document.getElementById('refresh').addEventListener('click', loadTasks);
loadTasks();
</script>
</body>
</html>
